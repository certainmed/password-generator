<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="icon/one.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <div class="container">

        <header class="app-header">
            <div class="app-title">
                <svg class="lock-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <rect x="3" y="11" width="18" height="11" rx="2.5" stroke="currentColor" stroke-width="1.75"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
                    <circle cx="12" cy="16.5" r="1.25" fill="currentColor"/>
                </svg>
                <div>
                    <h1>Password Generator</h1>
                    <p class="subtitle">Secure &amp; random</p>
                </div>
            </div>
            <div class="theme-options" role="group" aria-label="Color theme">
                <button class="theme-btn" data-theme="pastel-blue"   title="Blue"></button>
                <button class="theme-btn" data-theme="pastel-pink"   title="Pink"></button>
                <button class="theme-btn" data-theme="pastel-green"  title="Green"></button>
                <button class="theme-btn" data-theme="pastel-purple" title="Purple"></button>
                <button class="theme-btn" data-theme="pastel-yellow" title="Yellow"></button>
                <button class="theme-btn" data-theme="pastel-peach"  title="Peach"></button>
            </div>
        </header>

        <!-- Password output -->
        <section class="output-section">
            <div class="password-display-container">
                <input type="text" id="password-output" readonly placeholder="Click Generate…" aria-label="Generated password">
                <button id="copy-btn" title="Copy to clipboard" aria-label="Copy password">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 4V16C8 17.1 8.9 18 10 18H18C19.1 18 20 17.1 20 16V7.2C20 6.7 19.8 6.2 19.4 5.8L16.2 2.6C15.8 2.2 15.3 2 14.8 2H10C8.9 2 8 2.9 8 4Z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 18V20C16 21.1 15.1 22 14 22H6C4.9 22 4 21.1 4 20V8C4 6.9 4.9 6 6 6H8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="strength-row">
                <div class="strength-bar-bg">
                    <div id="strength-bar" class="strength-bar-fill"></div>
                </div>
                <span class="strength-label">Strength: <strong id="strength-text">—</strong></span>
            </div>

            <div id="qrcode-container" class="qrcode-box"></div>
        </section>

        <!-- Controls -->
        <section class="controls-section">

            <div class="control-row">
                <label class="control-label" for="length-slider">Length</label>
                <div class="length-input-container">
                    <input type="range" id="length-slider" min="4" max="64" value="16">
                    <input type="number" id="length-number" min="4" max="64" value="16" aria-label="Password length">
                </div>
                <span id="length-val" class="visually-hidden">16</span>
            </div>

            <div class="section-divider"></div>

            <div class="control-row control-row--top">
                <span class="control-label" id="include-label">Include</span>
                <div class="options-grid" role="group" aria-labelledby="include-label">
                    <label class="toggle-control">
                        <input type="checkbox" id="include-uppercase" checked>
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-text">A–Z</span>
                    </label>
                    <label class="toggle-control">
                        <input type="checkbox" id="include-lowercase" checked>
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-text">a–z</span>
                    </label>
                    <label class="toggle-control">
                        <input type="checkbox" id="include-numbers" checked>
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-text">0–9</span>
                    </label>
                    <label class="toggle-control">
                        <input type="checkbox" id="include-symbols" checked>
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-text">!@#</span>
                    </label>
                    <label class="toggle-control toggle-control--wide">
                        <input type="checkbox" id="exclude-ambiguous">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="toggle-text">Exclude O, 0, l, 1</span>
                    </label>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="control-row">
                <span class="control-label" id="mode-label">Mode</span>
                <div class="mode-selector" role="group" aria-labelledby="mode-label">
                    <input type="radio" name="mode" id="mode-all" value="all" checked>
                    <label for="mode-all" class="radio-label">All chars</label>
                    <input type="radio" name="mode" id="mode-easy" value="easy">
                    <label for="mode-easy" class="radio-label">Easy to say</label>
                </div>
            </div>

        </section>

        <button id="generate-btn" class="primary-btn">Generate</button>

        <!-- History -->
        <section class="history-section">
            <div class="history-header">
                <h2>History</h2>
                <div class="export-actions">
                    <button id="export-csv" class="sm-btn">CSV</button>
                    <button id="export-txt" class="sm-btn">TXT</button>
                    <button id="clear-history" class="sm-btn danger">Clear</button>
                </div>
            </div>
            <ul id="history-list" class="history-list" aria-label="Password history"></ul>
        </section>

    </div>
</div>

<script src="js/lib/qrcode.js"></script>
<script src="js/script.js"></script>
</body>
</html>
